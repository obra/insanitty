name: ci
# Fast gate on every push/PR: build + test the portable logic library (InsanittyCore).
# It is pure Foundation (no GTK), so this needs only a Swift toolchain. The real GTK app and
# its headless GUI e2e are built/run by deb.yml (which does the ~1h Ghostty engine build).
on:
  push:
    branches: [main, linux-port]
  pull_request:

jobs:
  core-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Swift (swiftly)
        run: |
          curl -fsSL -o /tmp/swiftly.tar.gz "https://download.swift.org/swiftly/linux/swiftly-$(uname -m).tar.gz"
          mkdir -p /tmp/swiftly-bin && tar -xf /tmp/swiftly.tar.gz -C /tmp/swiftly-bin
          SWIFTLY_HOME_DIR="$HOME/.local/swiftly" SWIFTLY_BIN_DIR="$HOME/.local/bin" \
            /tmp/swiftly-bin/swiftly init --assume-yes --skip-install --quiet-shell-followup
          "$HOME/.local/bin/swiftly" install latest --assume-yes
          echo "$(dirname "$(find "$HOME/.local/share/swiftly/toolchains" -name swiftc | head -1)")" >> "$GITHUB_PATH"

      - name: Build + test InsanittyCore
        run: |
          swift build
          swift test
